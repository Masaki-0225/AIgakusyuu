services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: trello_db
      POSTGRES_USER: trello_user
      POSTGRES_PASSWORD: trello_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trello_user -d trello_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
